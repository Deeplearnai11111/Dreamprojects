{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<div class="login-page">
    <div class="login-left">
        <h1 class="brand-title">CLEAN<span>ZO</span></h1>
        <p class="brand-subtitle">Enter your email and we'll send an OTP to reset your password.</p>
    </div>

    <div class="login-right">
        <div class="login-card">
            <h2 class="login-title">Forgot Password</h2>
            <p class="login-subtitle">Recover access using your registered email.</p>
            <form method="POST">
                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="login-btn">Send OTP</button>
            </form>
            <div class="register-link" style="margin-top:18px;">
                <p>Remembered your password?</p>
                <a href="{{ url_for('auth.login') }}">Log in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
