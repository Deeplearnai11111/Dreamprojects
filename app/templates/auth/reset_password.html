{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<div class="login-page">
    <div class="login-left">
        <h1 class="brand-title">CLEAN<span>ZO</span></h1>
        <p class="brand-subtitle">Enter the OTP we sent to your email and set a new password.</p>
    </div>

    <div class="login-right">
        <div class="login-card">
            <h2 class="login-title">Reset Password</h2>
            <p class="login-subtitle">Reset the password for {{ email }}.</p>
            <form method="POST">
                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" name="email" value="{{ email }}" readonly>
                </div>
                <div class="input-group">
                    <label>OTP CODE</label>
                    <input type="text" name="otp" placeholder="123456" required>
                </div>
                <div class="input-group">
                    <label>NEW PASSWORD</label>
                    <input type="password" name="password" placeholder="New password" required>
                </div>
                <div class="input-group">
                    <label>CONFIRM PASSWORD</label>
                    <input type="password" name="confirm_password" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="login-btn">Reset Password</button>
            </form>
            <div class="register-link" style="margin-top:18px;">
                <p>Want to go back?</p>
                <a href="{{ url_for('auth.login') }}">Log in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
