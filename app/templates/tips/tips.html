{% extends 'base.html' %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/plans.css') }}">

<style>
/* Tip cards layout */
.tips-column{max-width:900px;margin:20px auto;padding:12px}
.tip-card{display:flex;gap:18px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);border-radius:18px;padding:18px;margin-bottom:16px;align-items:flex-start}
.tip-badge{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#39cfff,#7b61ff);color:#02101d;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:18px}
.tip-body{flex:1}
.tip-body h3{margin:0 0 6px 0}
.tip-preview{color:#9fb6d0;margin:0 0 10px 0}
.full-content{display:none;color:#dceffb;margin-top:12px;border-top:1px solid rgba(255,255,255,0.03);padding-top:12px}
.tip-header{display:flex;justify-content:space-between;align-items:center}
.toggle-btn{background:transparent;border:none;color:var(--accent);cursor:pointer;font-weight:700}
.tip-card.expanded{box-shadow:0 18px 40px rgba(0,0,0,0.5)}
@media(max-width:700px){.tip-card{flex-direction:column}.tip-badge{width:44px;height:44px}}
</style>

<div class="tips-column">

    <div style="margin-bottom:8px;">
        <h1>TIPS</h1>
        <p class="muted">Car care tips and best practices</p>
    </div>

    {% for tip in tips %}
    <div class="tip-card" data-id="{{ tip.id }}">
        <div class="tip-badge">{{ '%02d'|format(tip.id) }}</div>
        <div class="tip-body">
            <div class="tip-header" tabindex="0" role="button">
                <h3>{{ tip.title }}</h3>
                <button class="toggle-btn">Read more ▾</button>
            </div>
            <p class="tip-preview">{{ tip.excerpt }}</p>
            <div class="full-content">{{ tip.content.replace('\n','<br>')|safe }}</div>
        </div>
    </div>
    {% endfor %}

</div>

<script>
document.querySelectorAll('.tip-card').forEach(card => {
    const header = card.querySelector('.tip-header');
    const btn = card.querySelector('.toggle-btn');
    const full = card.querySelector('.full-content');

    function toggle(){
        const expanded = card.classList.toggle('expanded');
        full.style.display = expanded ? 'block' : 'none';
        btn.textContent = expanded ? 'Hide details ▴' : 'Read more ▾';
        if(expanded) card.scrollIntoView({behavior:'smooth',block:'center'});
    }

    header.addEventListener('click', toggle);
    header.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
});
</script>

{% endblock %}
