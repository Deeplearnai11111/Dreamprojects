{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<div class="admin-main-content">

    <h2>Change Password</h2>

    <form method="POST" style="max-width:420px;margin-top:20px;">

        <input type="password" name="old_password" placeholder="Old password" required style="width:100%;padding:12px;margin-bottom:12px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:white;">

        <input type="password" name="new_password" placeholder="New password" required style="width:100%;padding:12px;margin-bottom:12px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:white;">

        <button type="submit" class="action-btn">Update Password</button>

    </form>

</div>

{% endblock %}
