{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<div class="admin-main-content">

    <h2>Bookings</h2>

    <div style="margin-top:18px;">

        <table style="width:100%;color:white;border-collapse:collapse;">
            <thead>
                <tr>
                    <th style="text-align:left;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">ID</th>
                    <th style="text-align:left;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">User ID</th>
                    <th style="text-align:left;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">Plan</th>
                    <th style="text-align:left;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">Slot</th>
                    <th style="text-align:left;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">Status</th>
                    <th style="text-align:right;padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for b in bookings %}
                <tr>
                    <td style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);">{{ b.id }}</td>
                    <td style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);">{{ b.user_id }}</td>
                    <td style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);">{{ b.plan_name or '-' }}</td>
                    <td style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);">{{ b.service_time or '-' }}</td>
                    <td style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);">{{ b.service_stage }} ({{ b.progress_percentage }}%)</td>
                    <td style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);text-align:right;">
                        <a href="{{ url_for('admin.admin_booking_detail', booking_id=b.id) }}" class="action-btn">View</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

{% endblock %}
