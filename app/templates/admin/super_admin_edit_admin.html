{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<div class="admin-main-content">

    <h2>Edit Admin</h2>

    <form method="POST" action="{{ url_for('admin.super_admin_edit_admin', user_id=user.id) }}" style="margin-top:12px;max-width:640px;">

        <label>Full Name</label>
        <input type="text" name="full_name" value="{{ user.full_name }}" style="width:100%;padding:8px;margin-bottom:8px;">

        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}" style="width:100%;padding:8px;margin-bottom:8px;">

        <label>New Password (leave blank to keep)</label>
        <input type="password" name="password" style="width:100%;padding:8px;margin-bottom:8px;">

        <button type="submit" class="action-btn">Save</button>

    </form>

</div>

{% endblock %}
